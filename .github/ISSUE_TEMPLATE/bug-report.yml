name: "🐛 Bug Report"
description: "Report broken links, formatting issues, or problems with build scripts"
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Build scripts
        - HTML edition rendering
        - PDF export
        - Website / documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
